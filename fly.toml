# fly.toml app configuration file generated for mcp-server-tepc4a on 2026-06-20T17:30:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mcp-server-tepc4a'
primary_region = 'ams'

[build]

[env]
  PORT = "8080"
  # No API keys or URLs are hardcoded here anymore!
  # The server is now multi-tenant. Each user provides their own credentials
  # via HTTP headers from their Claude/Cursor client.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
